# =====================================================================
# CONFIGURACION DE INFRAESTRUCTURA (capa mas externa de Clean Architecture)
# ---------------------------------------------------------------------
# Este fichero pertenece a la capa de frameworks y drivers.
# Si manana cambiamos H2 por PostgreSQL, cambiaria este fichero y los
# adaptadores JPA, pero NO el dominio ni los casos de uso.
# =====================================================================

# --- Base de datos H2 en memoria (Tema 6) ---
spring.datasource.url=jdbc:h2:mem:cursosdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate genera el esquema a partir de las entidades JPA del proyecto integrado.
spring.jpa.hibernate.ddl-auto=update
# Mostrar SQL en consola: util en formacion para ver que hace JPA por debajo.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Ejecutar data.sql DESPUES de que Hibernate cree las tablas.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

#Ejecutar con memoria
#spring.profiles.active=memory
#spring.sql.init.mode=never

#Ejecutar con JPA
spring.profiles.active=jpa


# --- Consola web de H2 ---
# Con la aplicacion arrancada: http://localhost:8080/h2-console
#   JDBC URL:  jdbc:h2:mem:cursosdb
#   User Name: sa
#   Password:  (vacio)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
